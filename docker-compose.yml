version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: spacefetch-mongo
    # No external port exposure — only accessible within the Docker network
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: spacefetch

  redis:
    image: redis:7-alpine
    container_name: spacefetch-redis
    # No external port exposure — only accessible within the Docker network
    volumes:
      - redis-data:/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: spacefetch-api
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_ADDR=redis:6379

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: spacefetch-worker
    depends_on:
      - mongodb
      - redis
    env_file:
      - .env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - REDIS_ADDR=redis:6379

